version: "3"

tasks:
    build:
        desc: Run tests and build all binaries
        cmds:
            - task: test
            - task: build:server
            - task: build:zigzag

    build:server:
        desc: Build the server binary
        cmds:
            - go build -o .bin/server ./cmd/server
        silent: false

    build:zigzag:
        desc: Build the zigzag binary
        cmds:
            - go build -o .bin/zigzag ./cmd/zigzag
        silent: false

    test:
        desc: Run all tests with race detection and coverage
        cmds:
            - go test -v -race -cover ./...
        silent: false

    run:server:
        desc: Build and run the server
        cmds:
            - task: build:server
            - ./.bin/server

    run:server:dev:
        desc: Build and run the server in dev mode (APP_ENV=dev). Pass ENV_FILE=.env
        vars:
            ENV_FILE: '{{.ENV_FILE | default ".env"}}'
        cmds:
            - task: build:server
            - APP_ENV=dev ENV_FILE={{.ENV_FILE}} ./.bin/server

    run:zigzag:
        desc: Build and run zigzag
        cmds:
            - task: build:zigzag
            - ./.bin/zigzag

    run:zigzag:dev:
        desc: Build and run zigzag in dev mode (APP_ENV=dev). Pass ENV_FILE=.env
        vars:
            ENV_FILE: '{{.ENV_FILE | default ".env"}}'
        cmds:
            - task: build:zigzag
            - APP_ENV=dev ENV_FILE={{.ENV_FILE}} ./.bin/zigzag

    webhook:forward:
        desc: Forward GitHub webhooks to local server via smee.io
        cmds:
            - smee --url https://smee.io/StaYxmPtfVR1Vq1 --target http://localhost:8080/internal/webhooks/github
