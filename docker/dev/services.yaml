services:
  migrate:
    build:
      context: ../..
      dockerfile: api/Dockerfile.dev
    command: >
      migrate
        -path /app/api/internal/db/migrations
        -database postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
        up
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: api/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ../..:/app
    environment:
      APP_ENV: dev
      PORT: "8080"
      DATABASE_URL: postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      HMAC_SIGNING_KEY: ${HMAC_SIGNING_KEY:-dev-hmac-signing-key-change-me}
      GCS_BUCKET: zagforge-snapshots
      GCS_ENDPOINT: http://fake-gcs:4443/storage/v1/
      WATCHDOG_SECRET: ${WATCHDOG_SECRET:-dev-watchdog-secret-change-me}
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64:-zRGOoTflIrEnmMmv25Yi3HZ6M9mKMd3U6Uw9YV6+uhU=}
      CLI_API_KEY: ${CLI_API_KEY:-zf_dev_cli_api_key}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ../..
      dockerfile: worker/Dockerfile.dev
    volumes:
      - ../..:/app
      - ../../.reports:/data/reports
    environment:
      APP_ENV: dev
      DATABASE_URL: postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
      REPORTS_DIR: /data/reports
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
      GCS_BUCKET: zagforge-snapshots
      GCS_ENDPOINT: http://fake-gcs:4443/storage/v1/
      API_BASE_URL: http://api:8080
      HMAC_SIGNING_KEY: ${HMAC_SIGNING_KEY:-dev-hmac-signing-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      api:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
