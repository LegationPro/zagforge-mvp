#:schema https://json.schemastore.org/any.json

env_files = []
root = "/app"
testdata_dir = "testdata"
tmp_dir = "/app/api/tmp"

[build]
  args_bin = []
  bin = "/app/api/tmp/server"
  cmd = "cd /app && go build -o /usr/local/bin/zagforge-worker ./worker/cmd/ && cd /app/api && go build -o ./tmp/server ./cmd/"
  delay = 1000
  entrypoint = ["/app/api/tmp/server"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "internal/db/sqlc"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  ignore_dangerous_root_dir = false
  include_dir = ["api", "shared/go", "worker"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  app_start_timeout = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
