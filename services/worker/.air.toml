root = "/app"
tmp_dir = "/app/worker/tmp"

[build]
  bin = "/app/worker/tmp/worker"
  cmd = "cd /app && go build -o /app/worker/tmp/worker ./worker/cmd/"
  entrypoint = ["/app/worker/tmp/worker"]
  delay = 1000
  exclude_dir = ["tmp", "vendor", ".reports"]
  exclude_regex = ["_test.go"]
  include_dir = ["worker", "shared/go", "api/internal/db"]
  include_ext = ["go"]
  kill_delay = "0s"
  log = "build-errors.log"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
